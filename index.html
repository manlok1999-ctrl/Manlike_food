<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@manlyk_food</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --brown: #2c1a0e;
    --terracotta: #c4602a;
    --gold: #d4a853;
    --sage: #7a8c6e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #fdf0e0 0%, #fae8d0 50%, #f5dfc5 100%);
    color: var(--brown);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* Profile */
  .profile { text-align: center; padding: 52px 0 28px; }
  .avatar {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, var(--terracotta), var(--gold));
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 6px 28px rgba(196,96,42,0.35);
  }
  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; margin-bottom: 4px;
  }
  .profile-handle { font-size: 13px; color: #9a7060; font-weight: 400; margin-bottom: 10px; }
  .profile-bio {
    font-size: 13px; color: #6b5040; line-height: 1.7;
    font-weight: 300; max-width: 280px; margin: 0 auto;
  }

  /* Links section */
  .links { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }

  /* Instagram button */
  .ig-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: white; border-radius: 14px; padding: 15px 20px;
    font-size: 14px; font-weight: 500; text-decoration: none;
    box-shadow: 0 4px 18px rgba(220,39,67,0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer; border: none; width: 100%;
  }
  .ig-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(220,39,67,0.4); }
  .ig-icon { font-size: 20px; }

  /* Section divider */
  .section-divider {
    display: flex; align-items: center; gap: 12px; margin: 4px 0 2px;
  }
  .section-divider span {
    font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--sage); white-space: nowrap;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: rgba(122,140,110,0.3);
  }

  /* Recipe button */
  .recipe-btn {
    background: #fff9f2;
    border: 1px solid rgba(196,96,42,0.12);
    border-radius: 14px; padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 2px 12px rgba(44,26,14,0.06);
    width: 100%; text-align: left;
  }
  .recipe-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(44,26,14,0.1); }
  .recipe-btn-left { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .recipe-btn-emoji { font-size: 30px; line-height: 1; }
  .recipe-btn-flag { font-size: 18px; line-height: 1; }
  .recipe-btn-content { flex: 1; min-width: 0; }
  .recipe-btn-tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--terracotta); margin-bottom: 2px;
  }
  .recipe-btn-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700; line-height: 1.25;
    color: var(--brown); margin-bottom: 4px;
  }
  .recipe-btn-meta { font-size: 11px; color: #9a7060; font-weight: 300; }
  .recipe-btn-arrow {
    font-size: 18px; color: var(--gold); flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .recipe-btn:hover .recipe-btn-arrow { transform: translateX(3px); }

  /* Country badge */
  .country-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 500;
    background: rgba(44,26,14,0.05);
    padding: 3px 8px; border-radius: 20px;
    color: #7a5c46; margin-top: 4px;
  }

  /* Footer */
  .footer { text-align: center; margin-top: 36px; }
  .footer-text { font-size: 11px; color: #b09080; font-weight: 300; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,26,14,0.55);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--cream);
    border-radius: 28px 28px 0 0;
    width: 100%; max-width: 480px; max-height: 90vh;
    overflow-y: auto;
    padding: 14px 24px 48px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(44,26,14,0.12);
    border-radius: 2px; margin: 0 auto 18px;
  }
  .modal-close {
    position: absolute; top: 18px; right: 20px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(44,26,14,0.07); border: none; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    color: var(--brown);
  }
  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .modal-emoji { font-size: 46px; line-height: 1; }
  .modal-flag { font-size: 28px; line-height: 1; }
  .modal-tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--terracotta); margin-bottom: 5px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 23px; font-weight: 700; line-height: 1.2; margin-bottom: 8px;
  }
  .modal-origin {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: #7a5c46;
    background: rgba(44,26,14,0.05);
    padding: 5px 12px; border-radius: 20px; margin-bottom: 12px;
  }
  .modal-desc {
    font-size: 13px; color: #7a5c46; line-height: 1.7;
    margin-bottom: 14px; font-weight: 300;
  }
  .modal-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .modal-pill { font-size: 11px; padding: 4px 11px; border-radius: 20px; font-weight: 500; }
  .pill-time { background: rgba(212,168,83,0.15); color: #9a7020; }
  .pill-serves { background: rgba(122,140,110,0.15); color: var(--sage); }
  .pill-type { background: rgba(196,96,42,0.1); color: var(--terracotta); }
  .modal-divider { height: 1px; background: rgba(44,26,14,0.07); margin: 14px 0; }
  .modal-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700; font-style: italic;
    color: var(--brown); margin-bottom: 8px;
  }
  .ingredient-list { list-style: none; }
  .ingredient-list li {
    font-size: 13px; padding: 6px 0;
    border-bottom: 1px solid rgba(44,26,14,0.05);
    color: #5a3e2e; display: flex; gap: 8px; font-weight: 300;
  }
  .ingredient-list li::before { content: '·'; color: var(--terracotta); font-weight: 700; flex-shrink: 0; }
  .caption-box {
    background: linear-gradient(135deg, rgba(196,96,42,0.05), rgba(212,168,83,0.05));
    border-radius: 14px; padding: 16px; margin-top: 16px;
    border: 1px solid rgba(196,96,42,0.1);
  }
  .caption-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--sage); margin-bottom: 8px;
  }
  .caption-text {
    font-size: 12px; line-height: 1.7; color: var(--brown);
    font-weight: 300; white-space: pre-wrap;
  }
  .copy-btn {
    width: 100%; margin-top: 12px; padding: 12px;
    background: var(--terracotta); color: white; border: none;
    border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background 0.2s ease;
  }
  .copy-btn:hover { background: #a8501f; }
  .copy-btn.copied { background: var(--sage); }
</style>
</head>
<body>

<div class="container">

  <div class="profile">
    <div class="avatar">🍳</div>
    <h1 class="profile-name">manlyk_food</h1>
    <p class="profile-handle">@manlyk_food</p>
    <p class="profile-bio">I love cooking and experimenting in the kitchen. Midweek meals inspired by flavours from around the world. 🌍</p>
  </div>

  <div class="links">

    <a class="ig-btn" href="https://instagram.com/manlyk_food" target="_blank">
      <span class="ig-icon">📸</span>
      Follow on Instagram
    </a>

    <div class="section-divider"><span>This Week's Recipes</span></div>

    <button class="recipe-btn" id="card-r1">
      <div class="recipe-btn-left">
        <span class="recipe-btn-emoji">🍗</span>
        <span class="recipe-btn-flag">🇹🇭</span>
      </div>
      <div class="recipe-btn-content">
        <p class="recipe-btn-tag">A Taste of Thailand</p>
        <p class="recipe-btn-title">Tom Yum Coconut & Lime Drumsticks</p>
        <p class="recipe-btn-meta">⏱ Under 1 hour &nbsp;·&nbsp; 🍽 Serves 4</p>
      </div>
      <span class="recipe-btn-arrow">›</span>
    </button>

    <button class="recipe-btn" id="card-r2">
      <div class="recipe-btn-left">
        <span class="recipe-btn-emoji">🥩</span>
        <span class="recipe-btn-flag">🇨🇳</span>
      </div>
      <div class="recipe-btn-content">
        <p class="recipe-btn-tag">A Taste of China</p>
        <p class="recipe-btn-title">Braised Pork Belly</p>
        <p class="recipe-btn-meta">⏱ 2.5 hours &nbsp;·&nbsp; 🍽 Serves 4</p>
      </div>
      <span class="recipe-btn-arrow">›</span>
    </button>

    <button class="recipe-btn" id="card-r3">
      <div class="recipe-btn-left">
        <span class="recipe-btn-emoji">🥢</span>
        <span class="recipe-btn-flag">🇯🇵</span>
      </div>
      <div class="recipe-btn-content">
        <p class="recipe-btn-tag">A Taste of Japan</p>
        <p class="recipe-btn-title">Beef Sukiyaki</p>
        <p class="recipe-btn-meta">⏱ 40 minutes &nbsp;·&nbsp; 🍽 Serves 4</p>
      </div>
      <span class="recipe-btn-arrow">›</span>
    </button>

  </div>

  <div class="footer">
    <p class="footer-text">Made with ♥ in my kitchen</p>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" id="closeBtn">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
var recipes = {
  r1: {
    emoji: '🍗', flag: '🇹🇭',
    tag: 'A Taste of Thailand',
    origin: 'Thailand',
    title: 'Tom Yum Coconut & Lime Drumsticks',
    desc: 'Inspired by the bold, tangy flavours of a Thai street kitchen — coconut milk, fresh lime, and tom yum paste come together in just 30 minutes of marinating for a sticky, punchy midweek dinner.',
    time: 'Under 1 hour', serves: '4', type: 'Midweek',
    ingredients: [
      '8 chicken drumsticks',
      '400ml full-fat coconut milk',
      '3 tbsp fresh lime juice',
      '2 tsp lime zest',
      '2 tbsp fish sauce',
      '2 tbsp tom yum paste',
      '4 garlic cloves, minced',
      '1 tbsp fresh ginger, grated',
      '1 lemongrass stalk, finely chopped',
      '1 tbsp brown sugar',
      'Fresh coriander, red chilli & lime wedges to serve'
    ],
    caption: '🇹🇭🍗 A Taste of Thailand — on a Wednesday. 🥥🍋\n\n30 minutes to marinate. 35 minutes in the oven. The kind of sticky, tangy, coconut-lime glaze that makes you feel like you\'re eating somewhere far more exciting than your kitchen. 🌶️🔥\n\nTom yum paste is the secret weapon here. Don\'t skip it.\n\nGrab a microwave rice pouch and you\'re golden. 🍚\n\n📌 Full recipe in bio!\n\n#TasteOfThailand #MidweekMeals #ThaiFood #CoconutChicken #TomYum #ChickenDrumsticks #HomeCooking #StickyChicken #EasyDinner #WorldFood'
  },
  r2: {
    emoji: '🥩', flag: '🇨🇳',
    tag: 'A Taste of China',
    origin: 'China',
    title: 'Braised Pork Belly',
    desc: 'A classic from the heart of Chinese home cooking — slow-braised in soy, Shaoxing wine, and five-spice until the fat melts into pure silk and the sauce becomes something you\'ll want to pour over everything.',
    time: '2.5 hours', serves: '4', type: 'Midweek',
    ingredients: [
      '1kg pork belly, skin on, cut into 5cm chunks',
      '3 tbsp light soy sauce',
      '2 tbsp dark soy sauce',
      '3 tbsp Shaoxing rice wine',
      '1 tbsp oyster sauce',
      '2 tbsp brown sugar',
      '1 tsp five-spice powder',
      '4 garlic cloves, smashed',
      '3cm fresh ginger, sliced',
      '2 spring onions, tied in a knot',
      '1 star anise',
      '400ml chicken stock',
      '1 tbsp vegetable oil',
      'Steamed rice & sliced spring onions to serve'
    ],
    caption: '🇨🇳🥩 A Taste of China — right in your kitchen. ✨\n\nBraised low and slow in soy, Shaoxing wine & five-spice. The whole house smells incredible and the pork just falls apart. 🤤\n\nPour that glossy sauce over steamed rice and try not to eat it straight from the pan. (Spoiler: you won\'t succeed.) 🍚🔥\n\n2.5 hours of patience = the best midweek treat you\'ll eat all week.\n\n📌 Full recipe in bio!\n\n#TasteOfChina #BraisedPorkBelly #ChineseFood #PorkBelly #SlowCook #MidweekMeals #WorldFood #HomeCooking #StickyPork #FiveSpice #ComfortFood'
  }
  ,
  r3: {
    emoji: '🥢', flag: '🇯🇵',
    tag: 'A Taste of Japan',
    origin: 'Japan',
    title: 'Beef Sukiyaki',
    desc: 'A warming Japanese hot pot — thinly sliced beef simmered in a rich, sweet-savoury warishita broth with tofu, glass noodles, and fresh vegetables. Dip in raw egg for the full experience.',
    time: '40 minutes', serves: '4', type: 'Midweek',
    ingredients: [
      '400g beef sirloin or ribeye, thinly sliced',
      '100ml soy sauce',
      '100ml mirin',
      '100ml sake',
      '2 tbsp caster sugar',
      '200ml dashi stock',
      '1 block firm tofu, cubed',
      '100g glass noodles, soaked',
      '4 spring onions, cut into 5cm pieces',
      '200g Chinese cabbage, roughly chopped',
      '6 shiitake mushrooms, halved',
      '1 tbsp vegetable oil',
      '4 eggs (optional, for dipping)',
      'Steamed rice to serve'
    ],
    caption: "🇯🇵🥢 A Taste of Japan — midweek comfort in a pan. 🍲✨\n\nBeef sukiyaki is the kind of dish that brings everyone around the table. Thinly sliced beef, silky tofu, glass noodles all simmered in a sweet soy broth that smells absolutely incredible. 🤤\n\nDip it in raw egg if you dare — that\'s how they do it. 🥚🔥\n\n40 minutes, one pan, zero complaints.\n\n📌 Full recipe in bio!\n\n#TasteOfJapan #BeefSukiyaki #JapaneseFood #Sukiyaki #MidweekMeals #HomeCooking #HotPot #WorldFood #JapaneseCooking #ComfortFood #EasyDinner"
  }
};

function openModal(id) {
  var r = recipes[id];
  var items = r.ingredients.map(function(i) { return '<li>' + i + '</li>'; }).join('');
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-header">' +
      '<span class="modal-emoji">' + r.emoji + '</span>' +
      '<span class="modal-flag">' + r.flag + '</span>' +
    '</div>' +
    '<p class="modal-tag">' + r.tag + '</p>' +
    '<h2 class="modal-title">' + r.title + '</h2>' +
    '<span class="modal-origin">' + r.flag + ' ' + r.origin + '</span>' +
    '<p class="modal-desc">' + r.desc + '</p>' +
    '<div class="modal-pills">' +
      '<span class="modal-pill pill-time">⏱ ' + r.time + '</span>' +
      '<span class="modal-pill pill-serves">🍽 Serves ' + r.serves + '</span>' +
      '<span class="modal-pill pill-type">' + r.type + '</span>' +
    '</div>' +
    '<div class="modal-divider"></div>' +
    '<p class="modal-section-title">Ingredients</p>' +
    '<ul class="ingredient-list">' + items + '</ul>' +
    '<div class="caption-box">' +
      '<p class="caption-label">📸 Instagram Caption</p>' +
      '<p class="caption-text" id="captionText"></p>' +
      '<button class="copy-btn" id="copyBtn">Copy Caption</button>' +
    '</div>';

  document.getElementById('captionText').textContent = r.caption;
  var cap = r.caption;
  document.getElementById('copyBtn').onclick = function() {
    var btn = this;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(cap).then(function() {
        btn.textContent = '✓ Copied!'; btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy Caption'; btn.classList.remove('copied'); }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = cap; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '✓ Copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy Caption'; btn.classList.remove('copied'); }, 2000);
    }
  };
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('card-r1').onclick = function() { openModal('r1'); };
document.getElementById('card-r2').onclick = function() { openModal('r2'); };
document.getElementById('card-r3').onclick = function() { openModal('r3'); };
document.getElementById('closeBtn').onclick = closeModal;
document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === this) closeModal();
};
</script>
</body>
</html>
